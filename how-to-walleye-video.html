let sceneElapsed = 0;
let playing = false;
let speed = 1;
let animFrame = null;

const fgImg = document.getElementById('fgImg');
const fgLayer = document.getElementById('fgLayer');
const textLayer = document.getElementById('textLayer');
const captionText = document.getElementById('captionText');
const captionTime = document.getElementById('captionTime');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const progressBar = document.getElementById('progressBar');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const speedBtn = document.getElementById('speedBtn');
const sceneIndicator = document.getElementById('sceneIndicator');
const timestamp = document.getElementById('timestamp');

totalTimeEl.textContent = formatTime(totalDuration);

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function getGlobalTime() {
  let t = 0;
  for (let i = 0; i < currentScene; i++) t += scenes[i].duration;
  return t + sceneElapsed;
}

function renderScene(idx, force) {
  const scene = scenes[idx];
  if (!scene) return;
  
  currentScene = idx;
  sceneIndicator.textContent = `${scene.id} / ${scenes.length}`;

  // Background
  if (scene.bg !== bgImg.getAttribute('src') || force) {
    bgImg.style.opacity = 0;
    setTimeout(() => {
      bgImg.src = scene.bg;
      bgImg.style.opacity = 1;
    }, 200);
  }

  // Foreground
  if (scene.fg) {
    fgLayer.style.display = 'flex';
    fgLayer.className = scene.fgClass || '';
    fgImg.src = scene.fg;
  } else {
    fgLayer.style.display = 'none';
  }

  // Text
  textLayer.innerHTML = scene.text;
  textLayer.style.opacity = 1;

  // Caption
  captionText.textContent = scene.caption;
  captionTime.textContent = scene.ts;

  // Timestamp
  timestamp.textContent = formatTime(getGlobalTime());

  // Progress
  const global = getGlobalTime();
  progressBar.style.width = `${(global / totalDuration) * 100}%`;
  currentTimeEl.textContent = formatTime(global);
}

function goToScene(idx) {
  if (idx < 0) idx = 0;
  if (idx >= scenes.length) idx = scenes.length - 1;
  sceneElapsed = 0;
  countdownVal = 5;
  stopPlayback();
  renderScene(idx, true);
  updateProgress();
}

function goNext() {
  stopPlayback();
  if (currentScene < scenes.length - 1) goToScene(currentScene + 1);
}

function goPrev() {
  stopPlayback();
  goToScene(currentScene - 1);
}

function updateProgress() {
  const global = getGlobalTime();
  progressBar.style.width = `${(global / totalDuration) * 100}%`;
  currentTimeEl.textContent = formatTime(global);
  timestamp.textContent = formatTime(global);
}

function stopPlayback() {
  if (sceneTimer) { clearInterval(sceneTimer); sceneTimer = null; }
  playing = false;
  playBtn.textContent = '▶';
}

function tickLoop() {
  if (!playing) return;
  const now = performance.now();
  const elapsedTotal = (now - playStartTime) / 1000 * speed;
  if (elapsedTotal >= totalDuration) {
    renderScene(scenes.length - 1, true);
    sceneElapsed = scenes[scenes.length - 1].duration;
    updateProgress();
    stopPlayback();
    return;
  }
  let acc = 0;
  for (let i = 0; i < scenes.length; i++) {
    if (acc + scenes[i].duration >= elapsedTotal) {
      if (i !== currentScene) {
        currentScene = i;
        sceneElapsed = elapsedTotal - acc;
        renderScene(i, true);
      }
      updateProgress();
      return;
    }
    acc += scenes[i].duration;
  }
}

function togglePlay() {
  if (playing) {
    stopPlayback();
  } else {
    playing = true;
    playBtn.textContent = '⏸';
    if (currentScene >= scenes.length - 1 && sceneElapsed >= scenes[currentScene].duration) {
      currentScene = 0;
      sceneElapsed = 0;
    }
    let acc = 0;
    for (let i = 0; i < currentScene; i++) acc += scenes[i].duration;
    acc += sceneElapsed;
    playStartTime = performance.now() - (acc / speed) * 1000;
    sceneTimer = setInterval(tickLoop, 100);
  }
}

// ─── Event Listeners ──────────────────────────────────────────────────────
playBtn.addEventListener('click', togglePlay);

prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { goNext(); }
  if (e.code === 'ArrowLeft') { goPrev(); }
});

speedBtn.addEventListener('click', () => {
  const speeds = [0.5, 1, 1.5, 2];
  let i = speeds.indexOf(speed);
  i = (i + 1) % speeds.length;
  speed = speeds[i];
  speedBtn.textContent = speed + '×';
  // Restart playback at new speed
  if (playing) {
    stopPlayback();
    togglePlay();
  }
});

// Progress bar click
document.getElementById('progressWrap').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const targetGlobal = pct * totalDuration;
  
  // Find which scene that falls in
  let acc = 0;
  for (let i = 0; i < scenes.length; i++) {
    if (acc + scenes[i].duration >= targetGlobal) {
      stopPlayback();
      currentScene = i;
      sceneElapsed = 0;
      renderScene(i, true);
      updateProgress();
      return;
    }
    acc += scenes[i].duration;
  }
});

// Init
goToScene(0);

</script>
</body>
</html>
