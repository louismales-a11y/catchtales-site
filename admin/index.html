<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex,nofollow"><title>CatchTales Admin</title>
<script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0A1628;color:#fff;font-size:14px}
.login-box{max-width:360px;margin:100px auto;padding:32px;background:#162033;border-radius:12px}
.login-box h1{margin-bottom:20px;font-size:20px}
.login-box input{width:100%;padding:10px 12px;margin-bottom:12px;background:#0A1628;border:1px solid #2a3a55;border-radius:6px;color:#fff;font-size:14px}
.login-box button{width:100%;padding:10px;background:#00BCD4;border:none;border-radius:6px;color:#003544;font-weight:600;font-size:14px;cursor:pointer}
.login-box .error{color:#F44336;font-size:13px;margin-top:8px}
.app{max-width:960px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px}
.header .user{font-size:12px;color:#8899AA}
.header button{background:none;border:1px solid #2a3a55;color:#B0C4DE;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.toolbar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.toolbar .btn{padding:6px 12px;border-radius:6px;border:1px solid #2a3a55;background:#162033;color:#B0C4DE;cursor:pointer;font-size:12px}
.toolbar .btn:hover{border-color:#00BCD4}
.toolbar .btn.active{background:#00BCD4;color:#003544;border-color:#00BCD4;font-weight:600}
.toolbar .btn.gen{background:#76FF03;color:#003544;border-color:#76FF03;font-weight:600}
.count{font-size:12px;color:#667;margin-right:8px}
#keyList{font-size:13px}
.row{padding:8px 6px;border-bottom:1px solid #1a2a44;display:flex;align-items:center;gap:6px;cursor:pointer;flex-wrap:wrap}
.row:hover{background:rgba(0,188,212,0.05)}
.row .code{font-family:monospace;font-size:12px;letter-spacing:0.5px;min-width:140px}
.row .badge{display:inline-block;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:0.5px}
.row .badge-life{background:#6663;color:#aaa}
.row .badge-yr{background:#FF8F0033;color:#FF8F00}
.row .badge-avail{background:#76FF0333;color:#76FF03}
.row .badge-used{background:#607D8B33;color:#78909C}
.row .badge-given{background:#FF980033;color:#FF9800}
.row .act-label{font-size:11px;font-weight:600;min-width:40px}
.row .act-detail{font-size:10px;color:#667}
.row .act-link{color:#00BCD4;font-size:10px;cursor:pointer;text-decoration:none}
.loading{text-align:center;padding:40px;color:#667;font-size:14px}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#162033;border:1px solid #2a3a55;border-radius:12px;padding:24px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:12px}
.modal h3{font-size:13px;margin:12px 0 6px;color:#8899AA}
.modal table{width:100%;border-collapse:collapse;font-size:13px}
.modal td{padding:5px 0;border-bottom:1px solid #1a2a44}
.modal td:last-child{text-align:right;font-weight:600;font-family:monospace}
.modal button{width:100%;padding:10px;margin-top:12px;background:#2a3a55;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}
.gen-modal .field{margin-bottom:10px}
.gen-modal label{font-size:12px;color:#8899AA;display:block;margin-bottom:3px}
.gen-modal input{width:100%;padding:8px 10px;background:#0A1628;border:1px solid #2a3a55;border-radius:6px;color:#fff;font-size:13px}
.gen-modal .type-select{display:flex;gap:6px;margin-bottom:10px}
.gen-modal .type-select button{flex:1;padding:8px;border-radius:6px;border:1px solid #2a3a55;background:#0A1628;color:#B0C4DE;cursor:pointer;font-size:13px}
.gen-modal .type-select button.active{background:#00BCD4;color:#003544;border-color:#00BCD4;font-weight:600}
.gen-modal .actions{display:flex;gap:6px}
.gen-modal .actions button{flex:1;padding:8px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:600}
.gen-modal .btn-cancel{background:#2a3a55;color:#B0C4DE}
.gen-modal .btn-gen{background:#76FF03;color:#003544}
.detail-modal .field{margin-bottom:10px}
.detail-modal label{font-size:12px;color:#8899AA;display:block;margin-bottom:3px}
.detail-modal input,.detail-modal textarea{width:100%;padding:8px 10px;background:#0A1628;border:1px solid #2a3a55;border-radius:6px;color:#fff;font-size:13px}
.detail-modal textarea{resize:vertical;min-height:40px}
.detail-modal .actions{display:flex;gap:6px;margin-top:8px}
.detail-modal .actions button{flex:1;padding:8px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:600}
.detail-modal .btn-close{background:#2a3a55;color:#B0C4DE}
.detail-modal .btn-copy{background:#1a5a7a;color:#fff}
.detail-modal .btn-save{background:#00BCD4;color:#003544}
.status{font-size:12px;color:#667;margin-top:6px}
@media(max-width:600px){.app{padding:6px}.row{font-size:12px}.row .code{min-width:100px;font-size:11px}}
</style>
</head>
<body>
<div class="login-box" id="loginBox"><h1>CatchTales Admin</h1>
<input type="email" id="emailInput" placeholder="Email" autocomplete="email">
<input type="password" id="passInput" placeholder="Password" autocomplete="current-password">
<button onclick="signIn()">Sign In</button><div class="error" id="loginError"></div></div>

<div class="app" id="app" style="display:none">
<div class="header"><div><h1>Pro Key Manager</h1><span class="user" id="userInfo"></span></div><button onclick="signOut()">Sign Out</button></div>
<div class="toolbar"><span class="count" id="countInfo">Loading...</span>
<button class="btn active" data-f="all" onclick="setF('all')">All</button>
<button class="btn" data-f="available" onclick="setF('available')">Avail</button>
<button class="btn" data-f="given" onclick="setF('given')">Given</button>
<button class="btn" data-f="used" onclick="setF('used')">Used</button>
<button class="btn gen" onclick="showGen()">+ Generate</button></div>
<div id="keyList"><div class="loading">Loading keys...</div></div></div>

<div class="overlay" id="detOverlay"><div class="modal detail-modal" id="detModal"></div></div>
<div class="overlay" id="genOverlay"><div class="modal gen-modal" id="genModal"></div></div>
<div class="overlay" id="actOverlay"><div class="modal" id="actModal"></div></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyBSAXvYCrHF5DjQGp-ISkY92QKoy-acJTw",authDomain:"catchtales-prod.firebaseapp.com",projectId:"catchtales-prod",storageBucket:"catchtales-prod.firebasestorage.app",appId:"1:883108283866:web:admin"});
const auth=firebase.auth(),db=firebase.firestore();
let allDocs=[],curF='all',curDoc=null,genType='lifetime',actCache={};

auth.onAuthStateChanged(u=>{if(u){document.getElementById('userInfo').textContent=u.email;document.getElementById('loginBox').style.display='none';document.getElementById('app').style.display='block';loadKeys()}else{document.getElementById('loginBox').style.display='block';document.getElementById('app').style.display='none'}});

async function signIn(){try{await auth.signInWithEmailAndPassword(document.getElementById('emailInput').value,document.getElementById('passInput').value)}catch(e){document.getElementById('loginError').textContent=e.message}}
function signOut(){auth.signOut()}

async function loadKeys(){document.getElementById('keyList').innerHTML='<div class="loading">Loading keys...</div>';try{
const snap=await db.collection('pro_licenses').get();allDocs=[];snap.forEach(d=>allDocs.push({id:d.id,...d.data()}));await render()
}catch(e){document.getElementById('keyList').innerHTML=`<div class="loading" style="color:#F44336">${e.message}</div>`}}

function getF(){
if(curF==='all')return allDocs;
return allDocs.filter(d=>{
if(curF==='used')return d.used===true;
if(curF==='available')return d.used!==true&&(d.givenTo||'').trim()==='';
if(curF==='given')return d.used!==true&&(d.givenTo||'').trim()!=='';
return true})}

async function render(){
const filtered=getF();
document.getElementById('countInfo').textContent=`${allDocs.length} total, ${filtered.length} shown`;
if(filtered.length===0){document.getElementById('keyList').innerHTML=`<div class="loading">${allDocs.length===0?'No keys yet':'No keys match'}</div>`;return}

// Collect emails and fetch user profiles
actCache={};
const emails=[...new Set(filtered.filter(d=>d.used&&d.activatedByEmail).map(d=>d.activatedByEmail))];
for(const email of emails){try{
const snap=await db.collection('users').where('email','==',email).limit(1).get();
if(snap.empty)actCache[email]={deleted:true};else snap.forEach(d=>actCache[email]=d.data())
}catch(e){}}

// Sort deleted to bottom
filtered.sort((a,b)=>{const aD=a.activatedByEmail&&actCache[a.activatedByEmail]?.deleted,bD=b.activatedByEmail&&actCache[b.activatedByEmail]?.deleted;if(aD&&!bD)return 1;if(!aD&&bD)return -1;return 0});

let html='';
for(const d of filtered){
const t=d.type||'lifetime',used=d.used===true,gv=(d.givenTo||'').trim();
const tc=t==='yearly'?'badge-yr':'badge-life',tl=t==='yearly'?'1YR':'LIFE';
let sc,sl;
if(used){sc='badge-used';sl='Used'}else if(gv){sc='badge-given';sl='Given'}else{sc='badge-avail';sl='Avail'}

let actHtml='<span style="color:#667">-</span>';
if(used&&d.activatedByEmail){
const u=actCache[d.activatedByEmail];
if(!u)actHtml='<span style="color:#F44336;font-size:11px">No data</span>';
else if(u.deleted)actHtml='<span style="color:#666;font-size:10px;font-style:italic">Deleted</span>';
else{
const last=u.lastLogin?u.lastLogin.toDate():null;
const sess=u.totalSessions||0;
const fish=u.catchCount||0;
const log=u.activityLog||{};
if(last){
const ds=Math.floor((Date.now()-last.getTime())/86400000);
let ac,al;
if(ds===0){ac='#76FF03';al='Today'}else if(ds<=3){ac='#8BC34A';al=ds+'d'}else if(ds<=7){ac='#FFC107';al=ds+'d'}else if(ds<=30){ac='#FF9800';al=ds+'d'}else{ac='#F44336';al=ds+'d'}
let wk=0,days=[];
for(let i=6;i>=0;i--){const dt=new Date(Date.now()-i*86400000),k=dt.toISOString().substring(0,10),c=log[k]||0;wk+=c;days.push({d:dt.toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'}),c})}
actHtml=`<span class="act-label" style="color:${ac}">${al}</span><br><span class="act-detail">${sess} opens, ${wk} this week</span><br><a class="act-link" onclick="showAct('${d.id}');return false">Details</a>`;
// Debug: show raw totalSessions value
const rawSess = JSON.stringify(u.totalSessions);
actHtml+=`<br><span style="color:#555;font-size:8px">raw:${rawSess}</span>`;
// Store activity data for this key
window['_act_'+d.id]={days,wk,sess,fish};
if(fish>0)actHtml+=`<br><span style="color:#667;font-size:9px">${fish} fish</span>`
}else actHtml='<span style="color:#FF9800;font-size:11px">Never</span>'
}}

html+=`<div class="row" onclick="openDet('${d.id}')">
<span class="code">${d.id}</span>
<span class="badge ${tc}">${tl}</span>
<span class="badge ${sc}">${sl}</span>
<span style="color:#8899AA;font-size:11px;flex:1;min-width:60px">${gv||'-'}</span>
<span style="color:#8899AA;font-size:11px;min-width:80px">${d.activatedByName||d.activatedByEmail||'-'}</span>
<span style="min-width:120px">${actHtml}</span>
</div>`}
document.getElementById('keyList').innerHTML=html}

function setF(f){curF=f;document.querySelectorAll('.toolbar .btn[data-f]').forEach(b=>b.classList.toggle('active',b.dataset.f===f));render()}

function showAct(id){const w=window['_act_'+id];if(!w)return;let rows='';for(const d of w.days)rows+=`<tr><td>${d.d}</td><td>${d.c}</td></tr>`;
document.getElementById('actModal').innerHTML=`<h2>Activity: ${id}</h2>
<table><tr><td>Total opens</td><td>${w.sess}</td></tr><tr><td>Opens this week</td><td>${w.wk}</td></tr><tr><td>Fish caught</td><td>${w.fish}</td></tr></table>
<h3>Last 7 Days</h3><table>${rows}</table><button onclick="closeOverlay('actOverlay')">Close</button>`;
document.getElementById('actOverlay').classList.add('open')}

function closeOverlay(id){document.getElementById(id).classList.remove('open')}

// Detail modal
function openDet(id){curDoc=allDocs.find(d=>d.id===id);if(!curDoc)return;
document.getElementById('detModal').innerHTML=`<h2>${curDoc.id}</h2>
<div class="field"><label>Given to</label><input id="detGiven" value="${(curDoc.givenTo||'').replace(/"/g,'&quot;')}"></div>
<div class="field"><label>Notes</label><textarea id="detNotes">${(curDoc.notes||'').replace(/"/g,'&quot;')}</textarea></div>
<div class="actions"><button class="btn-copy" onclick="copyKey()">Copy</button><button class="btn-save" onclick="saveDet()">Save</button><button class="btn-close" onclick="closeOverlay('detOverlay')">Close</button></div>
<div class="status" id="detStatus"></div>`;document.getElementById('detOverlay').classList.add('open')}

async function saveDet(){if(!curDoc)return;const g=document.getElementById('detGiven').value.trim(),n=document.getElementById('detNotes').value.trim();document.getElementById('detStatus').textContent='Saving...';try{
const upd={givenTo:g||null,notes:n||null};if(g&&!curDoc.givenAt)upd.givenAt=firebase.firestore.FieldValue.serverTimestamp();
await db.collection('pro_licenses').doc(curDoc.id).update(upd);document.getElementById('detStatus').textContent='Saved!';setTimeout(()=>closeOverlay('detOverlay'),500);await loadKeys()
}catch(e){document.getElementById('detStatus').textContent='Error: '+e.message}}

function copyKey(){navigator.clipboard.writeText(curDoc.id);document.getElementById('detStatus').textContent='Copied!'}

// Generate modal
function showGen(){document.getElementById('genModal').innerHTML=`<h2>Generate Keys</h2>
<div class="field"><label>Number of keys</label><input id="genCount" value="10" type="number" min="1" max="200"></div>
<div class="field"><label>Type</label><div class="type-select"><button class="active" data-t="lifetime" onclick="setGT('lifetime')">Lifetime</button><button data-t="yearly" onclick="setGT('yearly')">Yearly</button></div></div>
<div class="actions"><button class="btn-cancel" onclick="closeOverlay('genOverlay')">Cancel</button><button class="btn-gen" onclick="genKeys()">Generate</button></div>
<div class="status" id="genStatus"></div>`;document.getElementById('genOverlay').classList.add('open')}
function setGT(t){genType=t;document.querySelectorAll('.gen-modal .type-select button').forEach(b=>b.classList.toggle('active',b.dataset.t===t))}

async function genKeys(){const c=Math.max(1,Math.min(200,parseInt(document.getElementById('genCount').value)||10));document.getElementById('genStatus').textContent='Generating...';try{
const codes=[];let att=0;
while(codes.length<c&&att<200){att++;const code=genCode();if(codes.includes(code))continue;const e=await db.collection('pro_licenses').doc(code).get();if(!e.exists)codes.push(code)}
const batch=db.batch();for(const code of codes)batch.set(db.collection('pro_licenses').doc(code),{type:genType,used:false,usedAt:null,givenTo:null,givenAt:null,notes:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
await batch.commit();document.getElementById('genStatus').textContent='Generated '+codes.length+' ('+genType+')';setTimeout(()=>closeOverlay('genOverlay'),1500);await loadKeys()
}catch(e){document.getElementById('genStatus').textContent='Error: '+e.message}}

function genCode(){const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',seed=Date.now();return 'PRO-'+[0,1,2].map(p=>[0,1,2,3].map(i=>chars[(seed+p*7919+i*37)%chars.length]).join('')).join('-')}
</script>
</body>
</html>
