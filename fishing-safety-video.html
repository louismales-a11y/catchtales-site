<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▶ Fishing Safety Tips — Video Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  #player { position: relative; width: 100%; max-width: 960px; aspect-ratio: 16 / 9; background: #0A1628; overflow: hidden; }
  #bgLayer { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; transition: opacity 1.2s ease; }
  #bgLayer img { width: 100%; height: 100%; object-fit: cover; }
  #bgLayer .overlay { position: absolute; inset: 0; background: rgba(10,22,40,0.5); }
  #fgLayer { position: absolute; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
  #fgLayer img { max-width: 100%; max-height: 100%; object-fit: contain; }
  #textLayer { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; transition: opacity 0.6s ease; }
  #textLayer.top { justify-content: flex-start; padding-top: 6px; width: 100%; }
  #textLayer .big { font-size: clamp(1.4em, 4vw, 2.5em); font-weight: 800; color: #76FF03; text-shadow: 0 2px 30px rgba(0,0,0,0.8); letter-spacing: 1px; }
  #textLayer .big.cyan { color: #00BCD4; }
  #textLayer .sub { font-size: clamp(0.85em, 2vw, 1.2em); color: #B0C4DE; margin-top: 6px; text-shadow: 0 2px 20px rgba(0,0,0,0.8); line-height: 1.5; }
  #textLayer .list { font-size: clamp(0.75em, 1.8vw, 1em); color: #fff; line-height: 2; text-shadow: 0 2px 20px rgba(0,0,0,0.8); }
  #textLayer .list span { display: inline-block; background: rgba(0,188,212,0.15); border: 1px solid rgba(0,188,212,0.3); padding: 4px 14px; border-radius: 8px; margin: 3px; font-weight: 600; font-size: clamp(0.75em, 1.6vw, 0.9em); }
  #caption { position: absolute; bottom: 0; left: 0; right: 0; z-index: 4; padding: 40px 40px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.85) 60%); transition: opacity 0.5s ease; }
  #caption .text { font-size: clamp(0.8em, 1.8vw, 1em); color: #fff; text-shadow: 0 1px 10px rgba(0,0,0,0.5); line-height: 1.4; max-width: 85%; }
  #caption .timecode { font-size: clamp(0.65em, 1.3vw, 0.8em); color: #99B0CC; margin-top: 3px; font-family: monospace; }
  #timestamp { position: absolute; bottom: 16px; right: 24px; z-index: 5; font-size: clamp(0.75em, 1.5vw, 0.9em); color: rgba(255,255,255,0.5); font-family: monospace; }
  #watermark { position: absolute; top: 12px; left: 12px; z-index: 5; opacity: 0.85; }
  #watermark img { height: clamp(72px, 12vw, 108px); }
  #sceneIndicator { position: absolute; top: 16px; right: 16px; z-index: 5; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 20px; font-size: clamp(0.65em, 1.2vw, 0.8em); color: rgba(255,255,255,0.5); font-family: monospace; border: 1px solid rgba(255,255,255,0.06); }
  #controls { width: 100%; max-width: 960px; background: rgba(0,0,0,0.9); padding: 10px 20px; display: flex; align-items: center; gap: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  #controls button { background: none; border: none; color: #fff; font-size: 1.2em; cursor: pointer; min-width: 40px; min-height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: background 0.2s; }
  #controls button:hover { background: rgba(255,255,255,0.1); }
  #controls .time { color: #99B0CC; font-size: 0.8em; font-family: monospace; min-width: 80px; }
  #progressWrap { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; position: relative; }
  #progressBar { height: 100%; width: 0%; background: #00BCD4; border-radius: 3px; transition: width 0.1s linear; }
  #controls .speed { color: #99B0CC; font-size: 0.7em; font-family: monospace; cursor: pointer; padding: 4px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); min-width: 40px; text-align: center; }
  #controls .speed:hover { border-color: #00BCD4; color: #00BCD4; }
  @media (max-width: 700px) {
    #caption .text { max-width: 100%; font-size: 0.85em; }
    #caption { padding: 24px 12px 10px; }
    #textLayer { padding: 16px; }
    #controls { padding: 6px 10px; gap: 6px; flex-wrap: wrap; }
    #watermark img { height: clamp(48px, 10vw, 72px); }
  }
</style>
</head>
<body>
<div id="player">
  <div id="watermark"><img src="/images/catchtales-logo-video.png" alt="CatchTales"></div>
  <div id="sceneIndicator">1 / 15</div>
  <audio id="voAudio" preload="auto"></audio>
  <div id="bgLayer"><img id="bgImg" src="" alt=""><div class="overlay"></div></div>
  <div id="fgLayer" style="display:none;"><img id="fgImg" src="" alt=""></div>
  <div id="textLayer"></div>
  <div id="caption"><div class="text" id="captionText"></div><div class="timecode" id="captionTime"></div></div>
  <div id="timestamp">0:00</div>
</div>
<div id="controls">
  <button id="playBtn">&#9654;</button>
  <span class="time"><span id="currentTime">0:00</span> / <span id="totalTime">2:44</span></span>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <button id="prevBtn">&#9198;</button>
  <button id="nextBtn">&#9197;</button>
  <span class="speed" id="speedBtn">1x</span>
</div>
<script>
const audioFiles = ['01-intro','02-weather-before','03-weather-onwater','04-lightning-30','05-lightning-caught','06-boat-pfd','07-boat-safety','08-hooks-shallow','09-hooks-deep','10-sun-protection','11-cold-water','12-emergency','13-risks','14-checklist','15-outro'];
const P = '/images/fishing-safety-video/';
const scenes = [
  {id:1,duration:10,bg:P+'underwater.webp',fg:P+'catchtales-logo-video.png',text:'',caption:'[VIDEO: lake-water.mp4] "Fishing is one of the safest outdoor activities you can enjoy. But things can go wrong if you are not prepared."',ts:'0:00'},
  {id:2,duration:12,bg:P+'storm-clouds.jpg',text:'<div class="big">Weather Awareness</div><div class="sub">Check marine forecast, not just weather app<br>Wind over 20 km/h is dangerous for small boats<br>Tell someone your trip plan</div>',caption:'[VIDEO: storm.mp4] "Weather is the biggest safety factor. Check the marine forecast. Wind over 20 km per hour creates dangerous conditions for small boats."',ts:'0:10'},
  {id:3,duration:10,bg:P+'fog-lake.jpg',text:'<div class="big cyan">On the Water</div><div class="sub">Watch for darkening skies and distant thunder<br>Head for nearest shore if wind picks up<br>Fog can roll in fast — carry a compass or GPS</div>',caption:'"Watch for darkening skies, increasing wind, and distant thunder. These are your cues to head in. Fog can roll in fast."',ts:'0:22'},
  {id:4,duration:12,bg:P+'lightning.jpg',text:'<div class="big">Lightning Safety</div><div class="sub">The 30-30 Rule:<br>If thunder follows lightning in under 30 seconds<br>Get off the water immediately<br>Wait 30 minutes after the last strike</div>',caption:'[VIDEO: lightning.mp4] "Lightning is the most dangerous threat. Fishing rods are excellent lightning rods. The 30-30 rule: if thunder follows lightning in under 30 seconds, get off the water."',ts:'0:32'},
  {id:5,duration:10,bg:P+'lightning.jpg',text:'<div class="big cyan">If Caught in Lightning</div><div class="sub">Lay rods flat, stay low in center of boat<br>Avoid touching metal objects<br>On shore: avoid tall trees and open fields</div>',caption:'"If you cannot get off the water, lay your rods flat, stay low, and avoid metal. Waders with metal studs and graphite rods attract lightning."',ts:'0:44'},
  {id:6,duration:10,bg:P+'life-jacket.jpg',text:'<div class="big">Wear Your PFD</div><div class="sub">Not sitting on it — wearing it<br>Carry a whistle or air horn<br>Know navigation rules and right of way</div>',caption:'[VIDEO: boat.mp4] "Always wear your PFD. Most boating fatalities involve people not wearing life jackets. Carry a whistle and know the navigation rules."',ts:'0:54'},
  {id:7,duration:10,bg:P+'kayak.jpg',text:'<div class="big cyan">Boat &amp; Kayak Safety</div><div class="sub">Do not overload your boat<br>Alcohol and boating do not mix<br>Kayakers: practice self-rescue first</div>',caption:'"Do not overload your boat. Alcohol and boating do not mix. For kayak anglers, practice self-rescue in shallow water before your first trip."',ts:'1:04'},
  {id:8,duration:12,bg:P+'first-aid-kit.jpg',text:'<div class="big">Hook Removal</div><div class="sub">For shallow hooks in skin:<br>Push point through until it emerges<br>Cut barb with wire cutters<br>Back the hook out, clean, apply antiseptic</div>',caption:'"Getting hooked is a matter of when, not if. For shallow hooks, push the point through, cut the barb, back it out, and clean thoroughly."',ts:'1:14'},
  {id:9,duration:10,bg:P+'first-aid-kit.jpg',text:'<div class="big cyan">Deep Hooks &amp; Eyes</div><div class="sub">Do not remove it — you can cause more damage<br>Cut the line and leave the hook in place<br>Seek medical attention immediately</div>',caption:'"If the hook is deep, in the eye, face, or a joint, do not remove it. Cut the line and seek medical attention immediately."',ts:'1:26'},
  {id:10,duration:12,bg:P+'sunscreen.jpg',text:'<div class="big">Sun Protection</div><div class="sub">Water doubles UV exposure — you burn faster<br>SPF 30+, broad spectrum, water resistant<br>Reapply every 2 hours<br>UPF 50+ clothing, wide brim hat, polarized sunglasses</div>',caption:'"Water reflects UV rays, doubling your exposure. Use SPF 30 plus, wear UPF 50 plus clothing, a wide brim hat, and polarized sunglasses."',ts:'1:36'},
  {id:11,duration:12,bg:P+'cold-water.jpg',text:'<div class="big cyan">Cold Water Safety</div><div class="sub">Below 15 C: cold shock in 0-2 minutes<br>Loss of motor control in 2-15 minutes<br>Hypothermia in 15-30 minutes<br>Dress for water temp, not air temp</div>',caption:'"In water below 15 degrees, cold shock hits in minutes. Dress for the water temperature, not the air temperature. Avoid cotton, wear wool or synthetics."',ts:'1:48'},
  {id:12,duration:12,bg:P+'angler-boat.jpg',text:'<div class="big">Emergency Procedures</div><div class="sub">Stay calm — panic is your biggest enemy<br>Call 911 or marine radio channel 16<br>If someone goes overboard: throw, don\'t go<br>If boat capsizes: stay with the boat</div>',caption:'[VIDEO: angler.mp4] "Stay calm. Call 911 or channel 16. If someone goes overboard, throw, don\'t go. Throw a PFD or anything that floats. If your boat capsizes, stay with the boat."',ts:'2:00'},
  {id:13,duration:10,bg:P+'underwater.webp',text:'<div class="big cyan">Fishing-Specific Risks</div><div class="sub">Check behind you before every cast<br>Cover treble hook points when not in use<br>Use pliers for hook removal<br>Wash hands after handling lead weights</div>',caption:'"Check behind you before every cast. Cover treble hook points when not in use. Use pliers for hook removal. Consider non-toxic alternatives to lead."',ts:'2:12'},
  {id:14,duration:12,bg:P+'underwater.webp',text:'<div class="big">Safety Gear Checklist</div><div class="list" style="line-height:2.5;"><span>PFD</span> <span>Whistle</span> <span>First Aid Kit</span> <span>Wire Cutters</span><br><span>Sunscreen</span> <span>UPF Clothing</span> <span>Polarized Sunglasses</span><br><span>Phone + Waterproof Case</span> <span>Headlamp</span> <span>Throw Rope</span></div>',caption:'"Tape this to your tackle box: PFD, whistle, first aid kit with wire cutters, sunscreen, polarized sunglasses, phone in a waterproof case, and a headlamp."',ts:'2:22'},
  {id:15,duration:12,bg:P+'underwater.webp',fg:P+'catchtales-logo-video.png',text:'<div style="font-size:clamp(2.7em,6.6vw,3.9em);font-weight:800;color:#00BCD4;text-shadow:0 2px 30px rgba(0,0,0,0.8);margin-top:4px;">catchtales.com</div>',textClass:'top',caption:'"Stay safe out there. Log your trips in CatchTales, check the weather, and fish smart. Subscribe for more tips. Tight lines."',ts:'2:34'}
];
const totalDuration = scenes.reduce((a,s) => a+s.duration, 0);
let currentScene = 0, sceneElapsed = 0, playing = false, speed = 1, sceneTimer = null, playStartTime = 0;
const bgImg = document.getElementById('bgImg'), fgImg = document.getElementById('fgImg'), fgLayer = document.getElementById('fgLayer');
const textLayer = document.getElementById('textLayer'), captionText = document.getElementById('captionText'), captionTime = document.getElementById('captionTime');
const currentTimeEl = document.getElementById('currentTime'), totalTimeEl = document.getElementById('totalTime'), progressBar = document.getElementById('progressBar');
const playBtn = document.getElementById('playBtn'), sceneIndicator = document.getElementById('sceneIndicator'), timestamp = document.getElementById('timestamp');
totalTimeEl.textContent = formatTime(totalDuration);
function formatTime(s) { return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function renderScene(idx) {
  const s = scenes[idx]; if(!s) return; currentScene = idx;
  sceneIndicator.textContent = `${s.id} / ${scenes.length}`;
  bgImg.src = s.bg;
  if(s.fg) { fgLayer.style.display='flex'; fgImg.src=s.fg; } else fgLayer.style.display='none';
  textLayer.innerHTML = s.text; textLayer.className = s.textClass||'';
  captionText.textContent = s.caption; captionTime.textContent = s.ts;
  const audio = document.getElementById('voAudio');
  if(audioFiles[idx]) { audio.src = P+'audio/'+audioFiles[idx]+'.mp3'; audio.currentTime=0; audio.play().catch(()=>{}); }
  updateProgress();
}
function goToScene(idx) { if(idx<0) idx=0; if(idx>=scenes.length) idx=scenes.length-1; stopPlayback(); sceneElapsed=0; renderScene(idx); updateProgress(); }
function updateProgress() {
  let acc=0; for(let i=0;i<currentScene;i++) acc+=scenes[i].duration;
  const g=acc+sceneElapsed; progressBar.style.width=`${(g/totalDuration)*100}%`; currentTimeEl.textContent=formatTime(g); timestamp.textContent=formatTime(g);
}
function stopPlayback() { if(sceneTimer) { clearInterval(sceneTimer); sceneTimer=null; } playing=false; playBtn.textContent='\u25B6'; const a=document.getElementById('voAudio'); if(a) a.pause(); }
function tickLoop() {
  if(!playing) return; const elapsed = (performance.now()-playStartTime)/1000*speed;
  if(elapsed>=totalDuration) { stopPlayback(); renderScene(scenes.length-1); updateProgress(); return; }
  let acc=0; for(let i=0;i<scenes.length;i++) { if(acc+scenes[i].duration>=elapsed) { if(i!==currentScene) { currentScene=i; sceneElapsed=elapsed-acc; renderScene(i); } updateProgress(); return; } acc+=scenes[i].duration; }
}
function togglePlay() {
  if(playing) { stopPlayback(); return; }
  playing=true; playBtn.textContent='\u23F8';
  if(currentScene>=scenes.length-1) { currentScene=0; sceneElapsed=0; }
  let acc=0; for(let i=0;i<currentScene;i++) acc+=scenes[i].duration;
  playStartTime = performance.now() - (acc/speed)*1000;
  sceneTimer = setInterval(tickLoop, 100);
}
playBtn.addEventListener('click',togglePlay); prevBtn.addEventListener('click',()=>goToScene(currentScene-1)); nextBtn.addEventListener('click',()=>goToScene(currentScene+1));
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
speedBtn.addEventListener('click',()=>{const s=[0.5,1,1.5,2];let i=s.indexOf(speed);i=(i+1)%s.length;speed=s[i];speedBtn.textContent=speed+'x';if(playing){stopPlayback();togglePlay();}});
document.getElementById('progressWrap').addEventListener('click',e=>{const pct=(e.clientX-e.currentTarget.getBoundingClientRect().left)/e.currentTarget.offsetWidth;const t=pct*totalDuration;let acc=0;for(let i=0;i<scenes.length;i++){if(acc+scenes[i].duration>=t){stopPlayback();currentScene=i;sceneElapsed=0;renderScene(i);updateProgress();return;}acc+=scenes[i].duration;}});
goToScene(0);
</script>
</body>
</html>
