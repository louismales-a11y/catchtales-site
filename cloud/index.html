<!DOCTYPE html>
<html>
<head>
  <base href="/cloud/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CatchTales Cloud Dashboard - View your catches online">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CatchTales Cloud">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CatchTales Cloud Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0A1628;
      font-size: clamp(15px, 1.1vw, 17px);
    }

    /* ─── Background (behind everything) ─── */
    .underwater-bg {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .underwater-bg img.bg {
      width: 100%; height: 100%;
      object-fit: cover; opacity: 0.6;
    }
    .underwater-bg .overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10,22,40,0.45);
      pointer-events: none;
    }
    .swim-fish {
      position: absolute;
      opacity: 0.8;
      animation: swim linear infinite;
      pointer-events: none;
    }
    .swim-fish img { width: 100%; height: auto; transform: scaleX(-1); }
    .swim-fish.f1 { width: 100px; top: 12%; animation-duration: 22s; }
    .swim-fish.f2 { width: 80px; top: 30%; animation-duration: 28s; animation-delay: -5s; }
    .swim-fish.f3 { width: 120px; top: 50%; animation-duration: 18s; animation-delay: -11s; }
    .swim-fish.f4 { width: 85px; top: 68%; animation-duration: 25s; animation-delay: -7s; }
    .swim-fish.f5 { width: 105px; top: 82%; animation-duration: 20s; animation-delay: -3s; }
    @keyframes swim {
      0% { left: -140px; }
      100% { left: calc(100vw + 80px); }
    }

    /* ─── Fixed Header (matches other site pages) ─── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(10px, 1.8vw, 12px) max(24px, env(safe-area-inset-right)) clamp(10px, 1.8vw, 12px) max(24px, env(safe-area-inset-left));
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .site-header .logo-link {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .site-header nav {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .site-header nav a {
      color: #B0C4DE;
      text-decoration: none;
      font-size: clamp(12px, 1.1vw, 13px);
      margin-left: clamp(10px, 1.5vw, 16px);
      transition: color 0.2s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      touch-action: manipulation;
    }
    .site-header nav a:hover {
      color: #76FF03;
    }
    .site-header nav a:active {
      opacity: 0.6;
    }
    .site-header nav a.active {
      color: #76FF03;
    }

    /* ─── Transparent Flutter canvas (show HTML background through) ─── */
    flt-canvas-container,
    flt-canvas-container > div {
      background: #0A1628 !important;
    }
    flt-canvas-container canvas {
      background: #0A1628 !important;
    }

    loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #00BCD4;
      font-family: sans-serif;
      font-size: clamp(16px, 1.5vw, 18px);
      padding: 0 max(24px, env(safe-area-inset-right)) 0 max(24px, env(safe-area-inset-left));
    }

    .site-header .logo-link img {
      width: 150px;
      height: 150px;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <!-- Header: book image left, nav right, side by side -->
  <div class="site-header">
    <a href="/" class="logo-link">
      <img id="book-image" src="/images/prologinbook.webp" alt="">
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/features/">Features</a>
      <a href="/blog/">Blog</a>
      <a href="/cloud/" class="active">Dashboard</a>
      <a href="/about/">About</a>
      <a href="/faq/">FAQ</a>
      <a href="/contact/">Contact</a>
      <a href="/privacy/">Privacy</a>
      <a href="/terms/">Terms</a>
    </nav>
  </div>

  <script>
    // Watch URL hash to swap book image (Flutter sets hash on tab change)
    var bookMap = {
      '#login': '/images/prologinbook.webp',
      '#dashboard': '/images/prodashbook.webp',
      '#bragboard': '/images/bragboardbook.webp'
    };
    function updateBook() {
      var hash = location.hash || '#login';
      var img = document.getElementById('book-image');
      if (bookMap[hash]) {
        img.src = bookMap[hash];
        img.alt = hash.replace('#', '');
      }
    }
    window.addEventListener('hashchange', updateBook);
    updateBook();
  </script>

  <div class="underwater-bg">
    <img src="/underwater.jpg" alt="" class="bg">
    <div class="overlay"></div>
    <div class="swim-fish f1"><img src="/tfish1.webp" alt=""></div>
    <div class="swim-fish f2"><img src="/tfish2.webp" alt=""></div>
    <div class="swim-fish f3"><img src="/tfish3.webp" alt=""></div>
    <div class="swim-fish f4"><img src="/tfish4.webp" alt=""></div>
    <div class="swim-fish f5"><img src="/tfish5.webp" alt=""></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
